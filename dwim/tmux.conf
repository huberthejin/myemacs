set -g mouse on  
set -g history-limit 10000  
#set-option -g history-limit 5000
  
unbind C-b  
set -g prefix C-a  
bind C-a send-prefix  
  
bind = split-window -h  
bind - split-window -v  
unbind '"'  
unbind %  
  
bind r source-file ~/.tmux.conf \; display "Configuration reloaded"

set -g default-terminal "tmux-256color"

# Add this if you care about smoother Vim navigation later:
setw -g mode-keys vi  
set -g base-index 1

#set -g prefix C-a
#unbind C-b
#bind C-a send-prefix

